<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/aura_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Discover our premium culinary creations, hand-crafted pasta dishes, wood-fired grills, and signature drinks at AURA. Scan the QR code at your table to browse and order." />
    <link rel="manifest" href="/manifest.json" />
    <title>AURA</title>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          height: 100dvh;
          background-color: #121316;
          color: #c9a876;
        }
        
        .pot-container {
          width: 80px;
          height: 80px;
          margin-bottom: 20px;
          animation: gently-bounce 2s ease-in-out infinite;
        }
        
        .steam {
          stroke: #c9a876;
          stroke-width: 4;
          stroke-linecap: round;
          fill: none;
          animation: rise 2s ease-in-out infinite;
          opacity: 0;
        }
        .steam-1 { animation-delay: 0s; }
        .steam-2 { animation-delay: 0.6s; }
        .steam-3 { animation-delay: 1.2s; }
        
        @keyframes rise {
          0% { transform: translateY(5px); opacity: 0; }
          50% { opacity: 0.8; }
          100% { transform: translateY(-15px); opacity: 0; }
        }
        
        @keyframes gently-bounce {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-8px); }
        }
        
        .initial-loader-text {
          font-family: Georgia, serif;
          font-size: 32px;
          letter-spacing: 6px;
          margin-left: 6px; /* Offset for letter spacing centering */
          animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
          0%, 100% { opacity: 0.5; transform: scale(0.98); }
          50% { opacity: 1; transform: scale(1.02); }
        }
      </style>
      <div class="initial-loader-container">
        <svg class="pot-container" viewBox="0 0 100 100">
          <!-- Steam lines -->
          <path class="steam steam-1" d="M35 30 C 30 20, 40 10, 35 0" />
          <path class="steam steam-2" d="M50 30 C 45 20, 55 10, 50 0" />
          <path class="steam steam-3" d="M65 30 C 60 20, 70 10, 65 0" />
          
          <!-- Pot handles -->
          <path d="M20 50 C 5 50, 5 70, 20 70" fill="none" stroke="#c9a876" stroke-width="6" stroke-linecap="round" />
          <path d="M80 50 C 95 50, 95 70, 80 70" fill="none" stroke="#c9a876" stroke-width="6" stroke-linecap="round" />
          
          <!-- Pot body -->
          <path d="M20 40 L80 40 C 80 75, 70 85, 50 85 C 30 85, 20 75, 20 40 Z" fill="#c9a876" />
          <!-- Pot lid/rim -->
          <line x1="12" y1="40" x2="88" y2="40" stroke="#c9a876" stroke-width="8" stroke-linecap="round" />
        </svg>
        <div class="initial-loader-text">AURA</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
