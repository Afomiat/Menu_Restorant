<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/aura_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Discover our premium culinary creations, hand-crafted pasta dishes, wood-fired grills, and signature drinks at AURA. Scan the QR code at your table to browse and order." />
    <link rel="manifest" href="/manifest.json" />
    <title>AURA</title>
  </head>
  <body>
    <!-- 4-Second Unskippable 3D Loader Overlay -->
    <div id="initial-loader-overlay">
      <style>
        #initial-loader-overlay {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background-color: #121316;
          z-index: 99999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          transition: opacity 0.5s ease-in-out, visibility 0.5s;
        }
        .loader-content {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        
        .wind-text {
          position: relative;
          display: flex;
          flex-direction: column;
          align-items: center;
          animation: windFlyText 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .aura-title {
          font-family: 'Playfair Display', Georgia, serif;
          font-weight: 500;
          font-style: italic;
          font-size: 64px;
          letter-spacing: 6px;
          color: #c9a876;
          margin-left: 6px;
          line-height: 1.1;
        }

        .aura-subtitle {
          font-family: 'Playfair Display', Georgia, serif;
          font-weight: 400;
          font-style: italic;
          font-size: 32px;
          letter-spacing: 12px;
          color: rgba(201, 168, 118, 0.8);
          margin-top: 2px;
          margin-left: 12px;
        }

        .wind-hat {
          position: absolute;
          top: -45px;
          right: -35px;
          width: 90px;
          height: 90px;
          animation: windFlyHat 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
          z-index: 10;
        }
        
        .glassy-chef-img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          border-radius: 50%;
          opacity: 0.95;
          mask-image: radial-gradient(circle, black 40%, transparent 65%);
          -webkit-mask-image: radial-gradient(circle, black 40%, transparent 65%);
          filter: drop-shadow(0 0 10px rgba(201, 168, 118, 0.2));
        }

        @keyframes windFlyText {
          0% { transform: translateX(-150vw) rotate(-5deg); opacity: 0; }
          20% { transform: translateX(10px) rotate(2deg); opacity: 1; }
          30% { transform: translateX(0) rotate(0deg); opacity: 1; }
          80% { transform: translateX(0) rotate(0deg); opacity: 1; }
          100% { transform: translateX(-150vw) rotate(-5deg); opacity: 0; }
        }

        @keyframes windFlyHat {
          0% { transform: translate(100vw, -50vh) rotate(90deg) scale(0.5); opacity: 0; }
          25% { transform: translate(-10px, -5px) rotate(10deg) scale(1.1); opacity: 1; }
          35% { transform: translate(0, 0) rotate(25deg) scale(1); opacity: 1; } /* Lands tilted */
          75% { transform: translate(0, 0) rotate(25deg) scale(1); opacity: 1; }
          100% { transform: translate(100vw, -50vh) rotate(90deg) scale(0.5); opacity: 0; }
        }
      </style>
      <div class="loader-content">
        <div class="wind-text">
          <div class="aura-title">AURA</div>
          <div class="aura-subtitle">Menu</div>
        </div>
        <div class="wind-hat">
          <img src="/images/glassy_3d_chef.png" alt="Glassy Chef Hat" class="glassy-chef-img" />
        </div>
      </div>
    </div>
    
    <script>
      // Force the loader to stay for exactly 3 seconds to complete the animation
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader-overlay');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            setTimeout(() => loader.remove(), 500); // Remove from DOM after fade out
          }
        }, 3000);
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
