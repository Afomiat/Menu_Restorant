<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/aura_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Discover our premium culinary creations, hand-crafted pasta dishes, wood-fired grills, and signature drinks at AURA. Scan the QR code at your table to browse and order." />
    <link rel="manifest" href="/manifest.json" />
    <title>AURA</title>
  </head>
  <body>
    <!-- 4-Second Unskippable 3D Loader Overlay -->
    <div id="initial-loader-overlay">
      <style>
        #initial-loader-overlay {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background-color: #121316;
          z-index: 99999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          transition: opacity 0.5s ease-in-out, visibility 0.5s;
        }
        .chef-img {
          width: 180px;
          height: 180px;
          object-fit: cover;
          border-radius: 50%;
          mask-image: radial-gradient(circle, black 40%, transparent 70%);
          -webkit-mask-image: radial-gradient(circle, black 40%, transparent 70%);
          animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), gently-bounce-chef 2s ease-in-out infinite 1s;
          margin-bottom: 20px;
        }
        .aura-text {
          font-family: Georgia, serif;
          font-size: 32px;
          letter-spacing: 6px;
          color: #c9a876;
          margin-left: 6px;
          animation: fadeInUp 1s ease-out, pulse 2s ease-in-out infinite;
        }
        @keyframes bounceIn {
          0% { transform: scale(0.5); opacity: 0; }
          100% { transform: scale(1); opacity: 1; }
        }
        @keyframes gently-bounce-chef {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-12px); }
        }
        @keyframes fadeInUp {
          0% { transform: translateY(20px); opacity: 0; }
          100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes pulse {
          0%, 100% { opacity: 0.5; transform: scale(0.98); }
          50% { opacity: 1; transform: scale(1.02); }
        }
      </style>
      <img src="/images/cute_3d_chef.png" alt="AURA 3D Chef" class="chef-img" />
      <div class="aura-text">AURA</div>
    </div>
    
    <script>
      // Force the loader to stay for exactly 4 seconds
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader-overlay');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            setTimeout(() => loader.remove(), 500); // Remove from DOM after fade out
          }
        }, 4000);
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
